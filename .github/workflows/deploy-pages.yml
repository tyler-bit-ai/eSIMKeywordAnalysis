name: Deploy Public Dashboard

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: python -m pip install .

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Generate published dashboard data
        run: |
          python - <<'PY'
          from pathlib import Path
          from keyword_analysis.pipeline import export_korea_public_dashboard

          output_path = export_korea_public_dashboard(output_dir=Path("site/data"))
          print(f"Published dashboard data written to {output_path}")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
